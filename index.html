<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aula Lumen Evaluación</title>

<style>
body{
font-family: 'Segoe UI', sans-serif;
margin:0;
background: linear-gradient(135deg,#dbeafe,#f0f9ff);
}

header{
background:#2563eb;
color:white;
padding:18px;
font-size:20px;
font-weight:bold;
text-align:center;
}

main{
padding:15px;
max-width:1100px;
margin:auto;
}

.card{
background:white;
border-radius:15px;
padding:15px;
margin-bottom:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h3{margin-top:0}

input,select,textarea{
width:100%;
padding:10px;
margin-top:5px;
border-radius:10px;
border:1px solid #ccc;
font-size:14px;
}

button{
margin-top:10px;
padding:12px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

@media(max-width:700px){
.grid{grid-template-columns:1fr;}
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

td,th{
padding:10px;
border-bottom:1px solid #eee;
text-align:center;
}

.bad{color:red;font-weight:bold}
.good{color:green;font-weight:bold}
</style>
</head>

<body>

<header>📊 Aula Lumen - Evaluación Inteligente</header>

<main>

<div class="card">
<h3>📥 Cargar alumnos (copiar y pegar)</h3>
<textarea id="lista" placeholder="Formato:
1A Ana López
1B Juan Pérez
2G María Ruiz"></textarea>

<button onclick="cargarLista()">Cargar alumnos</button>
</div>

<div class="card grid">
<div>
<h3>🎓 Selección</h3>
<select id="grado">
<option>1</option>
<option>2</option>
<option>3</option>
</select>

<select id="grupo">
<option>A</option>
<option>B</option>
<option>C</option>
<option>D</option>
<option>F</option>
<option>G</option>
<option>H</option>
</select>

<select id="alumno"></select>
</div>

<div>
<h3>➕ Registro</h3>

<select id="tipo">
<option value="actividad">Actividad</option>
<option value="examen">Examen</option>
</select>

<input type="date" id="fecha">
<input type="number" id="valor" placeholder="0-100">

<button onclick="registrar()">Guardar</button>
</div>
</div>

<div class="card grid">
<div>
<h3>📅 Asistencia</h3>
<select id="asistencia">
<option value="P">Presente</option>
<option value="F">Falta</option>
<option value="R">Retardo</option>
</select>

<button onclick="guardarAsistencia()">Guardar</button>
</div>

<div>
<h3>⚖️ Conducta</h3>
<select id="conducta">
<option value="E">Excelente</option>
<option value="B">Buena</option>
<option value="R">Regular</option>
<option value="M">Mala</option>
<option value="G">Grave</option>
</select>

<button onclick="guardarConducta()">Guardar</button>
</div>
</div>

<div class="card">
<h3>📊 Resultados</h3>
<table id="tabla">
<tr>
<th>Alumno</th>
<th>Final</th>
</tr>
</table>
</div>

</main>

<script>
let alumnos=[];

function cargarLista(){
let texto=document.getElementById("lista").value.split("\n");

texto.forEach(linea=>{
let partes=linea.trim().split(" ");
let clave=partes[0];
let nombre=partes.slice(1).join(" ");

let grado=clave[0];
let grupo=clave[1];

alumnos.push({
nombre,grado,grupo,
actividades:[],
examenes:[],
faltas:0,
retardos:0,
conductas:[]
});
});

render();
}

function registrar(){
let i=document.getElementById("alumno").value;
let tipo=document.getElementById("tipo").value;
let val=parseFloat(document.getElementById("valor").value);

if(tipo==="actividad") alumnos[i].actividades.push(val);
else alumnos[i].examenes.push(val);

render();
}

function guardarAsistencia(){
let i=document.getElementById("alumno").value;
let tipo=document.getElementById("asistencia").value;

if(tipo==="F") alumnos[i].faltas++;
if(tipo==="R") alumnos[i].retardos++;

render();
}

function guardarConducta(){
let i=document.getElementById("alumno").value;
let tipo=document.getElementById("conducta").value;

alumnos[i].conductas.push(tipo);
render();
}

function prom(a){
if(a.length===0)return 0;
return a.reduce((x,y)=>x+y)/a.length;
}

function calc(a){

let base=5;

let act=(prom(a.actividades)/100)*3;
let exa=(prom(a.examenes)/100)*1;

let total=20;
let part=0.5*(1-((a.faltas+a.retardos*0.5)/total));

let cond=0.5;
a.conductas.forEach(c=>{
if(c==="R") cond-=0.1;
if(c==="M") cond-=0.2;
if(c==="G") cond-=0.3;
});

cond=Math.max(0,cond);

let final=base+act+exa+part+cond;
return final.toFixed(1);
}

function render(){

let g=document.getElementById("grado").value;
let gr=document.getElementById("grupo").value;

let select=document.getElementById("alumno");
select.innerHTML="";

let filtrados=alumnos.filter(a=>a.grado==g && a.grupo==gr);

filtrados.forEach((a,i)=>{
select.innerHTML+=`<option value="${alumnos.indexOf(a)}">${a.nombre}</option>`;
});

let tabla=document.getElementById("tabla");
tabla.innerHTML="<tr><th>Alumno</th><th>Final</th></tr>";

filtrados.forEach(a=>{
let f=calc(a);
tabla.innerHTML+=`
<tr>
<td>${a.nombre}</td>
<td class="${f>=8?'good':'bad'}">${f}</td>
</tr>`;
});
}

document.getElementById("grado").onchange=render;
document.getElementById("grupo").onchange=render;

render();
</script>

</body>
</html>
